[build]
  base = "client"
  command = "npm run build"
  publish = "client/dist"

# React Router uses client-side routing (/, /auctioneer, /teams) —
# Netlify needs to serve index.html for all of them so deep links
# and refreshes don't 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
